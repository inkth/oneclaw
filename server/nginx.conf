worker_processes auto;
events { worker_connections 1024; }

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 50M;

    gzip on;
    gzip_min_length 1024;
    gzip_types application/json text/plain text/css application/javascript;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" "$http_user_agent" '
                    'rid=$http_x_request_id';
    access_log /var/log/nginx/access.log main;

    limit_req_zone $binary_remote_addr zone=auth:10m rate=2r/s;
    limit_req_zone $binary_remote_addr zone=api:10m  rate=20r/s;

    upstream faxianmao_go   { server go-api:8080; keepalive 32; }
    upstream faxianmao_next { server next:3000;   keepalive 32; }

    # 复用的反代头
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;
    proxy_set_header Connection "";

    # HTTP → 全量跳 HTTPS(保留 ACME challenge 直通,供证书续期用 webroot)
    server {
        listen 80;
        server_name faxianmao.com www.faxianmao.com _;
        location /.well-known/acme-challenge/ { root /var/www/certbot; }
        location / { return 301 https://$host$request_uri; }
    }

    # HTTPS 正式主站 faxianmao.com
    server {
        listen 443 ssl;
        http2 on;
        server_name faxianmao.com;

        ssl_certificate     /etc/nginx/certs/faxianmao.com.crt;
        ssl_certificate_key /etc/nginx/certs/faxianmao.com.key;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_session_cache shared:SSL:10m;

        location = /health {
            proxy_pass http://faxianmao_go/health;
            access_log off;
        }

        # Agent 任务实时正文(SSE)。正则 location 优先于前缀 location,故须与 /api/ 分开配:
        # 默认的 proxy_buffering 会把增量攒起来一次性下发 —— 那等于没做流式。
        # 后端同时发了 X-Accel-Buffering: no 作双保险,两边任一漏配都会退化,别只留一处。
        location ~ ^/api/v1/workspaces/[^/]+/agent-tasks/[^/]+/stream$ {
            limit_req zone=api burst=40 nodelay;
            proxy_pass http://faxianmao_go;
            proxy_buffering off;
            proxy_cache off;
            gzip off;
            # 顾问最长约 150s,handler 侧 3 分钟收尾;这里留足余量避免反代先掐断。
            proxy_read_timeout 300s;
        }

        # Go 后端:鉴权路由更严的限流
        location /api/v1/auth/ {
            limit_req zone=auth burst=10 nodelay;
            proxy_pass http://faxianmao_go;
        }
        location /api/ {
            limit_req zone=api burst=40 nodelay;
            proxy_pass http://faxianmao_go;
        }

        # 其余全部交给 Next(SSR + 静态资源)
        location / {
            proxy_pass http://faxianmao_next;
        }
    }

    # www → apex 永久跳转(证书含 www SAN)
    server {
        listen 443 ssl;
        http2 on;
        server_name www.faxianmao.com;

        ssl_certificate     /etc/nginx/certs/faxianmao.com.crt;
        ssl_certificate_key /etc/nginx/certs/faxianmao.com.key;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        return 301 https://faxianmao.com$request_uri;
    }

}

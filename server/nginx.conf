worker_processes auto;
events { worker_connections 1024; }

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 50M;

    gzip on;
    gzip_min_length 1024;
    gzip_types application/json text/plain text/css application/javascript;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" "$http_user_agent" '
                    'rid=$http_x_request_id';
    access_log /var/log/nginx/access.log main;

    limit_req_zone $binary_remote_addr zone=auth:10m rate=2r/s;
    limit_req_zone $binary_remote_addr zone=api:10m  rate=20r/s;

    upstream oneclaw_go   { server go-api:8080; keepalive 32; }
    upstream oneclaw_next { server next:3000;   keepalive 32; }

    # 复用的反代头
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;
    proxy_set_header Connection "";

    server {
        listen 80;
        server_name _;

        # 证书就绪后改为跳 HTTPS:
        # return 301 https://$host$request_uri;

        location = /health {
            proxy_pass http://oneclaw_go/health;
            access_log off;
        }

        # Go 后端:鉴权路由更严的限流
        location /api/v1/auth/ {
            limit_req zone=auth burst=10 nodelay;
            proxy_pass http://oneclaw_go;
        }
        location /api/ {
            limit_req zone=api burst=40 nodelay;
            proxy_pass http://oneclaw_go;
        }

        # 其余全部交给 Next(SSR + 静态资源)
        location / {
            proxy_pass http://oneclaw_next;
        }
    }

    # —— HTTPS 模板(证书就绪后启用,并取消上方注释的 301)————————
    # server {
    #     listen 443 ssl http2;
    #     server_name oneclaw.app;
    #     ssl_certificate     /etc/nginx/certs/fullchain.pem;
    #     ssl_certificate_key /etc/nginx/certs/privkey.pem;
    #     ssl_protocols TLSv1.2 TLSv1.3;
    #     # 同上三个 location 块
    # }
}
